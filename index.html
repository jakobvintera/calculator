<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Calculator</title>
  <link href="styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>

<body>
  <div>
    <h1 class="title">Online Calculator</h1>
  </div>
  <div class="workingArea">
    <div class="calculator">
      <div class="left">
        <div class="display">
          <p id="displayNumber">0</p>
        </div>
        <div class="singleNumOp">
          <button id="root">√</button>
          <button id="suptwo">x²</button>
          <button id="supthree">x³</button>
          <button id="pi">π</button>
        </div>
        <div class="numbers">
          <button id="seven">7</button>
          <button id="eight">8</button>
          <button id="nine">9</button>
        </div>
        <div class="numbers">
          <button id="four">4</button>
          <button id="five">5</button>
          <button id="six">6</button>
        </div>
        <div class="numbers">
          <button id="one">1</button>
          <button id="two">2</button>
          <button id="three">3</button>
        </div>
        <div class="numbers">
          <button id="zero">0</button>
          <button id="comma">.</button>
          <button id="prefix">±</button>
        </div>
      </div>

      <div class="right">
        <button id="clear">Clear</button>
        <button id="delete">Del</button>
        <button class="operator" id="division">÷</button>
        <button class="operator" id="multiplication">×</button>
        <button class="operator" id="subtraction">-</button>
        <button class="operator" id="addition">+</button>
        <button id="result">=</button>
      </div>
    </div>
    <div>
      <div class="overview">
        <div>
          <h3> Interactive History</h3>
        </div>
